server:
  port: 8080

spring:
  application:
    name: jwt-auth-demo
  
  datasource:
    url: jdbc:h2:mem:jwtdb
    driver-class-name: org.h2.Driver
    username: sa
    password: 
  
  h2:
    console:
      enabled: true
      path: /h2-console
  
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        format_sql: true

# JWT Configuration
jwt:
  secret: mySecretKey1234567890mySecretKey1234567890mySecretKey1234567890
  access-token:
    expiration: 900000    # 15 minutes (in milliseconds)
  refresh-token:
    expiration: 604800000  # 7 days (in milliseconds)

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info

# Logging
logging:
  level:
    org.codeart.jwt: DEBUG
    org.springframework.security: DEBUG

# Springdoc
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
